  <style>
    /* -------------------- RESET & BASE (FITS ALL DEVICES) -------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 2vw, 20px);
      background: radial-gradient(circle at 0% 30%, rgba(40, 120, 255, 0.5), rgba(5, 25, 60, 0.98)),
                  linear-gradient(145deg, #0a2540 0%, #1f5f9e 100%);
      background-attachment: fixed;
      position: relative;
    }

    /* floating glass effect */
    body::before {
      content: "";
      position: fixed;
      width: min(70vmax, 800px);
      height: min(70vmax, 800px);
      top: -10vh;
      right: -5vw;
      background: radial-gradient(circle, rgba(120, 200, 255, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* main card – fully responsive */
    .phishguard-app {
      width: 100%;
      max-width: 1400px;
      background: rgba(18, 40, 70, 0.35);
      backdrop-filter: blur(22px) saturate(200%);
      -webkit-backdrop-filter: blur(22px) saturate(200%);
      border-radius: clamp(24px, 5vw, 48px);
      box-shadow: 0 40px 80px rgba(0, 10, 30, 0.7), 0 0 0 1.5px rgba(255, 255, 255, 0.2) inset;
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow: hidden;
      z-index: 10;
    }

    /* header – flexible */
    .app-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: clamp(0.8rem, 3vw, 1.5rem) clamp(1rem, 4vw, 2.5rem);
      background: rgba(10, 30, 60, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      gap: 12px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 16px);
      flex-wrap: wrap;
    }

    .shield-icon {
      background: linear-gradient(150deg, #2266cc, #103a70);
      color: white;
      width: clamp(45px, 8vw, 65px);
      height: clamp(45px, 8vw, 65px);
      border-radius: clamp(15px, 3vw, 22px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .logo-area h1 {
      font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      background: linear-gradient(to right, #ffffff, #cde1ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 5px 20px #003388;
      line-height: 1.2;
    }

    .badge-header {
      background: rgba(0, 180, 150, 0.3);
      backdrop-filter: blur(10px);
      color: white;
      padding: 0.5rem clamp(1rem, 3vw, 2rem);
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.5);
      font-weight: 600;
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      white-space: nowrap;
    }

    /* layout – responsive flex */
    .app-layout {
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 720px) {
      .app-layout {
        flex-direction: row;
      }

      backdrop-filter: blur(18px);

      width: 100%;

    @media (min-width: 720px) {

    }

    .nav-header {
      text-transform: uppercase;
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      font-weight: 600;
      color: rgba(200, 220, 250, 0.8);
      letter-spacing: 0.12em;
      margin-bottom: 1.2rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 16px);
      padding: clamp(0.7rem, 2vw, 1rem) clamp(0.8rem, 2vw, 1.2rem);
      margin-right: 0.5rem;
      border-radius: 30px 0 0 30px;
      color: white;
      font-weight: 500;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .nav-item {
        white-space: normal;
        word-break: break-word;
      }
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.9);
      flex-shrink: 0;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.2);
      border-left: 6px solid white;
      border-top: 1px solid rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      font-weight: 600;
    }

    /* main content panel */
    .content-panel {
      flex: 1;
      background: rgba(18, 45, 75, 0.25);
      backdrop-filter: blur(24px);
      padding: clamp(1.2rem, 4vw, 2.5rem) clamp(1.2rem, 4vw, 2.8rem);
      border-radius: 0 0 48px 0;
      width: 100%;
    }

    .panel-title {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(to bottom, #fff, #d0e8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      margin-bottom: 0.2rem;

    .panel-sub {
      color: rgba(255, 255, 255, 0.85);
      font-size: clamp(0.85rem, 2vw, 1rem);
      margin-bottom: clamp(1.2rem, 3vw, 2rem);

    .input-label {
      color: white;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(0.9rem, 2vw, 1rem);
    }

    /* textarea wrapper with scan animation */
    .textarea-wrapper {
      position: relative;
      width: 100%;
      border-radius: clamp(20px, 4vw, 28px);
      overflow: hidden;
    }

    .email-textarea {
      width: 100%;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: clamp(20px, 4vw, 28px);
      padding: clamp(1rem, 3vw, 1.5rem);
      background: rgba(0, 20, 40, 0.3);
      backdrop-filter: blur(20px);
      color: white;
      font-size: clamp(0.9rem, 2vw, 1rem);
      line-height: 1.5;
      resize: vertical;
      min-height: min(200px, 30vh);
      font-family: 'SF Mono', 'Fira Code', monospace;
      transition: border 0.2s;
      position: relative;
      z-index: 2;
    }

    .email-textarea:focus {
      outline: none;
      border-color: white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
    }

    /* scanning overlay */
    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(115deg, 
        rgba(0, 160, 255, 0.1) 0%, 
        rgba(120, 220, 255, 0.2) 25%, 
        rgba(0, 160, 255, 0.1) 50%,
        rgba(120, 220, 255, 0.2) 75%,
        rgba(0, 160, 255, 0.1) 100%);
      background-size: 300% 100%;
      border-radius: clamp(20px, 4vw, 28px);
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: overlay;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.5) inset;
      animation: scanMove 1.8s linear infinite;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .scan-overlay.active {
      opacity: 1;
    }

    @keyframes scanMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .scan-pulse {
      animation: textPulse 1.2s ease-in-out infinite;
    }

    @keyframes textPulse {
      0% { text-shadow: 0 0 5px rgba(0,200,255,0); }
      50% { text-shadow: 0 0 15px rgba(0,200,255,0.5); }
      100% { text-shadow: 0 0 5px rgba(0,200,255,0); }
    }

    .char-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin: 0.8rem 0 1.5rem;
      gap: 8px;
    }

    .char-count {
      background: rgba(0, 20, 50, 0.5);
      backdrop-filter: blur(10px);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      font-size: clamp(0.8rem, 2vw, 0.9rem);
    }

    .analyze-btn {
      background: linear-gradient(145deg, #2a6fd6, #12428b);
      border: none;
      color: white;
      padding: clamp(0.8rem, 2.5vw, 1.2rem) clamp(1rem, 3vw, 2rem);
      width: 100%;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.5);
      transition: 0.15s;
    }

    .result-card {
      background: rgba(0, 20, 50, 0.4);
      backdrop-filter: blur(30px);
      border-radius: clamp(24px, 5vw, 36px);
      padding: clamp(1.2rem, 3vw, 2rem);
      margin: 1.8rem 0 1rem;
      border-left: clamp(8px, 2vw, 12px) solid;
      color: white;
    }

    .risk-header {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 15px);
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .risk-icon { font-size: clamp(2rem, 6vw, 2.8rem); }
    .risk-title { font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 700; }
    .badge {
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 1px solid white;
      color: white;
      margin-left: auto;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      white-space: nowrap;
    }

    .history-item {
      background: rgba(10, 30, 60, 0.4);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: clamp(0.8rem, 2.5vw, 1.3rem) clamp(1rem, 3vw, 1.8rem);
      border: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      color: white;
      gap: 12px;
    }

    /* Install section – fully responsive */
    .install-section {
      background: rgba(30, 80, 140, 0.35);
      backdrop-filter: blur(30px);
      border-radius: clamp(30px, 6vw, 48px);
      margin: 2rem 0 0.8rem;
      padding: clamp(1rem, 3vw, 2rem);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 2px solid rgba(255,255,255,0.5);
      gap: 16px;
    }

    .install-text {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 600;
    }

    .home-screen-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      color: white;
      padding: 0.6rem clamp(1.2rem, 4vw, 2.5rem);
      border-radius: 60px;
      font-weight: 700;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .home-screen-btn {
        white-space: normal;
        width: 100%;
        justify-content: center;
      }
    }

    .home-instruction {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: rgba(255,255,255,0.9);
      margin-top: 0.5rem;
      width: 100%;
      text-align: center;
      border-top: 1px dashed rgba(255,255,255,0.3);
      padding-top: 0.8rem;
    }

    .webforge-credit {
      text-align: center;
      padding: clamp(0.8rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.9);
      border-top: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.15);
      font-weight: 500;
      font-size: clamp(0.8rem, 2vw, 1rem);
    }

    .footer-note {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      color: rgba(255,255,255,0.8);
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.2);
      gap: 10px;
    }

    /* small screen adjustments */
    @media (max-width: 480px) {
      .app-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .badge-header {
        align-self: flex-start;
      }
      
      .nav-item {
        border-radius: 30px;
        margin-right: 0;
      }
      
      .nav-item.active {
        border-left: 6px solid white;
      }

  </style>

<body>
  <div class="phishguard-app">
    <div class="app-header">
      <div class="logo-area">
        <div class="shield-icon"><i class="fas fa-shield-virus"></i></div>
        <h1>PhishGuard </h1>
      </div>
      <div class="badge-header"><i class="fas fa-check-circle"></i>WEBFORGE· Team</div>
    </div>

    <div class="app-layout">
      <div class="nav-sidebar">
        <div class="nav-header">NAVIGATION</div>
        <div class="nav-item active" id="navNewAnalysis"><i class="fas fa-file-lines"></i> New Analysis</div>
        <div class="nav-item" id="navScanHistory"><i class="fas fa-clock-rotate-left"></i> Scan History</div>
        <div style="margin-top: 2.5rem; color: rgba(255,255,255,0.5); padding-left: 0.5rem; font-size: 0.9rem;">
          <i class="fa-regular fa-copyright"></i> responsive design
        </div>
      </div>

      <div class="content-panel" id="mainContent"></div>
    </div>
    <div class="webforge-credit">
      <i class="fas fa-code"></i> Build by WebForge Team ·&copy 2026
    </div>
  </div>

  <script>
    (function() {
      // State & persistence
      let scanHistory = [];
      try {
        const saved = localStorage.getItem('phishguard_history');
        if (saved) scanHistory = JSON.parse(saved);
      } catch (e) {}

      function saveHistory() {
        try { localStorage.setItem('phishguard_history', JSON.stringify(scanHistory)); } catch (e) {}
      }

      let currentPage = 'newAnalysis';
      const main = document.getElementById('mainContent');
      const navNew = document.getElementById('navNewAnalysis');
      const navHistory = document.getElementById('navScanHistory');

      // Advanced phishing engine (same as before)
      function analyzeRisk(emailText) {
        const lower = emailText.toLowerCase();
        let score = 0;
        let details = [];

        if (lower.includes('from:')) {
          const fromMatch = lower.match(/from:\s*([^\n]*)/i);
          if (fromMatch) {
            const fromVal = fromMatch[1];
            if (fromVal.match(/@(paypa?l|paypa1|secure-|bankofamerica|chase|wellsfargo|apple|amazon|microsoft|irs|gov)/i)) score += 20, details.push('Suspicious sender domain');
            if (fromVal.match(/\.(tk|ml|ga|cf|gq|xyz|top|loan|work|account|secure|verify|click|help)\b/i)) score += 20, details.push('Risky TLD in sender');
          }
        }

        const replyMatch = lower.match(/reply-to:\s*([^\n]*)/i);
        const fromMatch = lower.match(/from:\s*([^\n]*)/i);
        if (replyMatch && fromMatch && replyMatch[1].trim() !== fromMatch[1].trim()) {
          score += 30;
          details.push('Reply-To differs from From (red flag)');
        } else if (replyMatch) {
          score += 8;
          details.push('Reply-To header present');
        }

        const returnPath = lower.match(/return-path:\s*([^\n]*)/i);
        if (returnPath && fromMatch && !returnPath[1].includes(fromMatch[1].split('@')[1]?.replace('>',''))) {
          score += 25;
          details.push('Return-Path mismatch');
        }

        const urgency = ['urgent', 'suspended', 'limited', 'verify immediately', 'click below', 'within 24h', 'account closure', 'unusual activity', 'password expired', 'update payment', 'keep your account', 'reactivate', 'restricted', 'blocked'];
        urgency.forEach(word => { if (lower.includes(word)) { score += 5; details.push(`urgency: "${word}"`); } });

        const links = lower.match(/https?:\/\/[^\s"']+/g) || [];
        links.forEach(link => {
          if (link.includes('bit.ly') || link.includes('tinyurl') || link.includes('shortlink')) score += 12, details.push('shortened URL (obfuscation)');
          const domainMatch = link.match(/https?:\/\/([^\/]+)/);
          if (domainMatch) {
            const domain = domainMatch[1].toLowerCase();
            const brands = ['paypal', 'apple', 'amazon', 'microsoft', 'chase', 'wellsfargo', 'dropbox', 'dhl'];
            for (let b of brands) if (domain.includes(b) && !domain.endsWith('.com') && !domain.endsWith('.org') && !domain.endsWith('.net')) { score += 20; details.push(`deceptive ${b} link`); break; }
          }
        });

        if (lower.includes('<form') || lower.includes('action=')) { score += 12; details.push('embedded form'); }
        if (lower.includes('.exe') || lower.includes('.zip') || lower.includes('attach')) { score += 15; details.push('dangerous attachment'); }
        if (lower.includes('password') || lower.includes('credential')) score += 8;

        score = Math.min(100, Math.max(0, score));
        let risk = 'low';
        if (score >= 60) risk = 'high';
        else if (score >= 30) risk = 'medium';

        const unique = [...new Set(details)].slice(0, 6);
        return { score, risk, details: unique };
      }

      function renderResult(risk, score, details, parent) {
        let icon = '✅', title = 'Low Risk', color = '#6fda9f';
        if (risk === 'high') { icon = '🚫'; title = 'HIGH RISK - Phishing Likely'; color = '#ff8a8a'; }
        else if (risk === 'medium') { icon = '⚠️'; title = 'MEDIUM RISK - Suspicious'; color = '#f9c39c'; }

        const detailHtml = details.length ? 
          '<ul style="margin-left:1.2rem;">' + details.map(d => `<li>🔸 ${d}</li>`).join('') + '</ul>' : 
          '<p>No strong indicators, but always verify sender.</p>';

        parent.innerHTML = `
          <div class="result-card" style="border-left-color: ${color};">
            <div class="risk-header">
              <span class="risk-icon">${icon}</span>
              <span class="risk-title">${title}</span>
              <span class="badge">score ${score}/100</span>
            </div>
            ${detailHtml}
            <div style="display:flex; align-items:center; gap:12px; margin-top:1rem; flex-wrap:wrap;">
              <span style="font-size:clamp(0.8rem,2vw,0.9rem);">threat level</span>
              <div class="meter-bar" style="height:12px; background:rgba(255,255,255,0.2); border-radius:20px; flex:1; min-width:100px;"><div class="meter-fill" style="height:12px; border-radius:20px; width:${score}%; background:white;"></div></div>
              <span style="font-size:clamp(0.8rem,2vw,0.9rem);">${score}%</span>
            </div>
          </div>
        `;
      }

      // Home screen install guide
      function guideHomeScreenInstall() {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        
        if (isStandalone) {
          alert('✅ PhishGuard is already installed on your home screen and running as a standalone app.');
          return;
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isAndroid = /Android/.test(navigator.userAgent);
        
        let message = '📱 To install PhishGuard on your home screen:\n\n';
        if (isIOS) {
          message += '• Tap the Share button (📤) at the bottom.\n• Scroll down and tap "Add to Home Screen".\n• Then tap "Add".';
        } else if (isAndroid) {
          message += '• Tap the menu (⋮) in Chrome.\n• Tap "Add to Home screen".\n• Then tap "Add" / "Install".';
        } else {
          message += '• In Chrome/Edge: Click the install icon (➕) in the address bar.\n• Or use menu → "Install page as app".\n\nAfter installation, it will open in its own window.';
        }
        
        alert(message);
      }

      // Render New Analysis
      function renderNewAnalysis(initialText = '') {
        const defaultText = initialText || `From: support@paypa1.com
Reply-To: verify-now@fake-account.tk
Return-Path: bounce@malicious.xyz
Subject: Urgent: Account suspension warning

Dear customer, we noticed unusual activity. Verify immediately to keep your account.

Click here: http://fake-paypal-verify.xyz/login

We take security seriously.`;

        const escaped = defaultText.replace(/</g, '&lt;');
        const html = `
          <div class="panel-title">New Analysis</div>
          <div class="panel-sub">Paste email content — responsive on all devices</div>
          <div class="input-label"><i class="fas fa-paste"></i> Raw Email Content</div>
          <div class="textarea-wrapper">
            <textarea id="emailInput" class="email-textarea" placeholder="Paste email content...">${escaped}</textarea>
            <div id="scanOverlay" class="scan-overlay"></div>
          </div>
          <div class="char-stats">
            <span class="char-count" id="charCounter"><i class="far fa-keyboard"></i> <span id="charCountNumber">${defaultText.length}</span> chars</span>
            <span style="color:rgba(255,255,255,0.8);">min 10</span>
          </div>
          <button class="analyze-btn" id="analyzeBtn"><i class="fa-solid fa-bolt"></i> Run Professional Analysis</button>
          <div id="liveResult"></div>

          <!-- HOME SCREEN INSTALL SECTION (responsive) -->
          <div class="install-section">
            <div class="install-text">
              <i class="fas fa-home" style="font-size:clamp(1.5rem,4vw,2rem);"></i> Add to Home Screen
            </div>
            <button class="home-screen-btn" id="homeScreenBtn">
              <i class="fa-solid fa-download"></i> Install App
            </button>
            <div class="home-instruction">
              <i class="fa-regular fa-circle-check"></i> Opens standalone · fits all devices
            </div>
          </div>

          <div class="footer-note">
            <span><i class="fa-regular fa-shield"></i> WebForge v2.0</span>
            <span><i class="fa-regular fa-mobile"></i> responsive</span>
          </div>
        `;
        main.innerHTML = html;

        const textarea = document.getElementById('emailInput');
        const charSpan = document.getElementById('charCountNumber');
        const liveDiv = document.getElementById('liveResult');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const scanOverlay = document.getElementById('scanOverlay');

        textarea.addEventListener('input', () => charSpan.innerText = textarea.value.length);
        const res = analyzeRisk(defaultText);
        renderResult(res.risk, res.score, res.details, liveDiv);

        analyzeBtn.addEventListener('click', () => {
          const txt = textarea.value;
          if (txt.length < 10) {
            liveDiv.innerHTML = '<div style="background:#c05a5a40; border-radius:28px; padding:1rem;">⚠️ Please enter at least 10 characters.</div>';
            return;
          }

          analyzeBtn.disabled = true;
          scanOverlay.classList.add('active');
          textarea.classList.add('scan-pulse');

          setTimeout(() => {
            const res = analyzeRisk(txt);
            renderResult(res.risk, res.score, res.details, liveDiv);

            scanOverlay.classList.remove('active');
            textarea.classList.remove('scan-pulse');
            analyzeBtn.disabled = false;

            const timestamp = new Date().toLocaleString();
            const preview = txt.substring(0, 50).replace(/\n/g, ' ') + (txt.length>50 ? '…' : '');
            scanHistory.unshift({ timestamp, preview, risk: res.risk, score: res.score, full: txt });
            if (scanHistory.length > 15) scanHistory.pop();
            saveHistory();
          }, 400);
        });

        document.getElementById('homeScreenBtn').addEventListener('click', guideHomeScreenInstall);
      }

      function renderScanHistory() {
        let histHtml = `<div class="panel-title">Scan History</div><div class="panel-sub">Previously analyzed emails (persistent)</div>`;
        if (scanHistory.length === 0) {
          histHtml += `<div style="background:rgba(0,30,70,0.4); border-radius:32px; padding:2rem; color:white;">📭 No scans yet.</div>`;
        } else {
          scanHistory.forEach((item, idx) => {
            histHtml += `
              <div class="history-item">
                <div style="flex:2; min-width:180px;"><i class="fa-regular fa-clock"></i> ${item.timestamp}<br><span style="color:#b0d0ff; word-break:break-word;">${item.preview}</span></div>
                <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                  <span class="badge">${item.risk} ${item.score}</span>
                  <button class="reloadScan" data-index="${idx}" style="background:rgba(255,255,255,0.2); border:1px solid white; border-radius:40px; padding:0.3rem 1.2rem; color:white; cursor:pointer;"><i class="fa-regular fa-folder-open"></i> load</button>
                </div>
              </div>
            `;
          });
        }
        histHtml += `
          <div class="install-section">
            <div class="install-text"><i class="fas fa-home"></i> Home Screen App</div>
            <button class="home-screen-btn" id="historyInstallBtn"><i class="fa-solid fa-download"></i> Install</button>
            <div class="home-instruction">Opens standalone · fits all screens</div>
          </div>
          <div class="footer-note">
            <span>${scanHistory.length} entries</span>
            <span id="clearHistory" style="cursor:pointer;"><i class="fa-regular fa-trash-can"></i> clear all</span>
          </div>
        `;
        main.innerHTML = histHtml;

        document.querySelectorAll('.reloadScan').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const idx = e.currentTarget.getAttribute('data-index');
            const entry = scanHistory[idx];
            if (entry) { setActivePage('newAnalysis'); renderNewAnalysis(entry.full); }
          });
        });

        document.getElementById('clearHistory')?.addEventListener('click', () => {
          scanHistory = [];
          saveHistory();
          renderScanHistory();
        });

        document.getElementById('historyInstallBtn')?.addEventListener('click', guideHomeScreenInstall);
      }

      function setActivePage(page) {
        currentPage = page;
        if (page === 'newAnalysis') {
          navNew.classList.add('active'); navHistory.classList.remove('active');
          renderNewAnalysis();
        } else {
          navHistory.classList.add('active'); navNew.classList.remove('active');
          renderScanHistory();
        }
      }

      navNew.addEventListener('click', () => setActivePage('newAnalysis'));
      navHistory.addEventListener('click', () => setActivePage('scanHistory'));

      setActivePage('newAnalysis');

      // Detect standalone mode
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        setTimeout(() => {
          const msg = document.createElement('div');
          msg.style.position = 'fixed';
          msg.style.bottom = '20px';
          msg.style.right = '20px';
          msg.style.background = 'rgba(0,200,150,0.3)';
          msg.style.backdropFilter = 'blur(10px)';
          msg.style.color = 'white';
          msg.style.padding = '0.8rem 1.5rem';
          msg.style.borderRadius = '60px';
          msg.style.border = '1px solid white';
          msg.style.zIndex = '9999';
          msg.style.fontSize = 'clamp(0.7rem,2vw,0.9rem)';
          msg.style.maxWidth = '90%';
          msg.innerHTML = '🏠 Running as standalone home screen app';
          document.body.appendChild(msg);
          setTimeout(() => msg.remove(), 4000);
        }, 500);
      }
    })();
  </script>
</body>
</html>
